function b64ToAB(b){const s=atob(b),a=new ArrayBuffer(s.length),u=new Uint8Array(a);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return a}
function parseGLB(buf){
  const dv=new DataView(buf);
  if(dv.getUint32(0,true)!==0x46546c67)throw new Error('Not GLB');
  let o=12;const jl=dv.getUint32(o,true);o+=8;
  const gltf=JSON.parse(new TextDecoder().decode(new Uint8Array(buf,o,jl)));
  o+=jl;if(o&3)o+=4-(o&3);
  let bin=null;
  if(o<buf.byteLength){const bl=dv.getUint32(o,true);o+=8;bin=buf.slice(o,o+bl)}
  const geoms=[];
  for(const mesh of gltf.meshes){
    for(const prim of mesh.primitives){
      const g=new THREE.BufferGeometry();
      const pa=gltf.accessors[prim.attributes.POSITION],pb=gltf.bufferViews[pa.bufferView];
      const po=(pb.byteOffset||0)+(pa.byteOffset||0);
      g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(bin.slice(po,po+pa.count*12)),3));
      if(prim.attributes.NORMAL!==undefined){
        const na=gltf.accessors[prim.attributes.NORMAL],nb=gltf.bufferViews[na.bufferView];
        const no2=(nb.byteOffset||0)+(na.byteOffset||0);
        g.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(bin.slice(no2,no2+na.count*12)),3));
      }
      if(prim.indices!==undefined){
        const ia=gltf.accessors[prim.indices],ib=gltf.bufferViews[ia.bufferView];
        const io2=(ib.byteOffset||0)+(ia.byteOffset||0),bpe=ia.componentType===5123?2:4;
        const sl=bin.slice(io2,io2+ia.count*bpe);
        g.setIndex(new THREE.BufferAttribute(ia.componentType===5123?new Uint16Array(sl):new Uint32Array(sl),1));
      }
      g.computeBoundingBox();
      geoms.push(g);
    }
  }
  const res=[];
  (gltf.nodes||[]).forEach(n=>{
    if(n.mesh!==undefined&&geoms[n.mesh]){
      const g2=geoms[n.mesh].clone(),m=new THREE.Matrix4();
      if(n.matrix)m.fromArray(n.matrix);
      else m.compose(new THREE.Vector3(...(n.translation||[0,0,0])),new THREE.Quaternion(...(n.rotation||[0,0,0,1])),new THREE.Vector3(...(n.scale||[1,1,1])));
      g2.applyMatrix4(m);res.push(g2);
    }
  });
  return res.length?res:geoms;
}

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.001,100);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
document.getElementById('wrap').appendChild(renderer.domElement);

const modelGroup=new THREE.Group();
scene.add(modelGroup);

const mouse={x:0,y:0,sx:0,sy:0};
window.addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth-0.5)*2;mouse.y=(e.clientY/innerHeight-0.5)*2});
let isHovered=false,hoverGlow=0;
document.getElementById('wrap').addEventListener('mouseenter',()=>isHovered=true);
document.getElementById('wrap').addEventListener('mouseleave',()=>isHovered=false);

const orbit={
  r:3,th:Math.PI*0.25,ph:Math.PI*0.4,target:new THREE.Vector3(),
  drag:false,lx:0,ly:0,auto:true,spd:0.12,_t:null,
  update(dt){
    if(this.auto)this.th+=this.spd*dt;
    camera.position.set(
      this.target.x+this.r*Math.sin(this.ph)*Math.cos(this.th),
      this.target.y+this.r*Math.cos(this.ph),
      this.target.z+this.r*Math.sin(this.ph)*Math.sin(this.th));
    camera.lookAt(this.target);
  }
};
renderer.domElement.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.lx=e.clientX;orbit.ly=e.clientY;orbit.auto=false});
window.addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.lx)*0.005;orbit.ph=Math.max(0.1,Math.min(Math.PI-0.1,orbit.ph-(e.clientY-orbit.ly)*0.005));orbit.lx=e.clientX;orbit.ly=e.clientY});
window.addEventListener('pointerup',()=>{orbit.drag=false;clearTimeout(orbit._t);orbit._t=setTimeout(()=>orbit.auto=true,3000)});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();orbit.r=Math.max(0.5,Math.min(10,orbit.r+e.deltaY*0.002))},{passive:false});

let layers={edges:[],glow:[],solid:[]};
let entrance=0;

function build(geometries){
  while(modelGroup.children.length){const c=modelGroup.children[0];modelGroup.remove(c);if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose()}
  layers={edges:[],glow:[],solid:[]};entrance=0;
  const box=new THREE.Box3();
  geometries.forEach(g=>{g.computeBoundingBox();box.union(g.boundingBox)});
  const ctr=new THREE.Vector3();box.getCenter(ctr);
  const sz=new THREE.Vector3();box.getSize(sz);
  const sc=2/Math.max(sz.x,sz.y,sz.z);
  geometries.forEach(geom=>{
    geom.translate(-ctr.x,-ctr.y,-ctr.z);
    geom.scale(sc,sc,sc);
    const hex=0xbaccce;
    const eg=new THREE.EdgesGeometry(geom,15);
    const em=new THREE.LineBasicMaterial({color:hex,transparent:true,opacity:0});
    const el=new THREE.LineSegments(eg,em);
    layers.edges.push(el);modelGroup.add(el);
    const gg=new THREE.EdgesGeometry(geom,15);
    const gm=new THREE.LineBasicMaterial({color:hex,transparent:true,opacity:0});
    const gl=new THREE.LineSegments(gg,gm);
    gl.scale.setScalar(1.015);
    layers.glow.push(gl);modelGroup.add(gl);
    const sm=new THREE.MeshBasicMaterial({color:hex,transparent:true,opacity:0,side:THREE.DoubleSide});
    const sM=new THREE.Mesh(geom,sm);
    layers.solid.push(sM);modelGroup.add(sM);
  });
}

try{build(parseGLB(b64ToAB(GLB_B64)))}catch(e){console.error(e)}

const gc=document.getElementById('grain');gc.width=256;gc.height=256;
const gx=gc.getContext('2d');
function rGrain(){const img=gx.createImageData(256,256),d=img.data;for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255}gx.putImageData(img,0,0)}
rGrain();setInterval(rGrain,100);

let last=performance.now();
function animate(t){
  requestAnimationFrame(animate);
  const dt=Math.min((t-last)/1000,0.1);last=t;
  if(entrance<1){entrance=Math.min(1,entrance+dt/1.2);modelGroup.scale.setScalar(0.85+0.15*(1-Math.pow(1-entrance,3)))}
  const fi=1-Math.pow(1-Math.min(1,entrance),3);
  mouse.sx+=(mouse.x-mouse.sx)*2.5*dt;
  mouse.sy+=(mouse.y-mouse.sy)*2.5*dt;
  modelGroup.rotation.x=mouse.sy*0.08;
  modelGroup.rotation.z=-mouse.sx*0.04;
  const ht=isHovered?1:0;hoverGlow+=(ht-hoverGlow)*4*dt;
  const pulse=Math.sin(t*0.0008)*0.08;
  layers.edges.forEach(l=>{l.material.opacity=(0.85+hoverGlow*0.15+pulse*0.3)*fi});
  layers.glow.forEach(l=>{l.material.opacity=(0.28+hoverGlow*0.09+pulse)*fi});
  layers.solid.forEach(l=>{l.material.opacity=(0.05+hoverGlow*0.02)*fi});
  orbit.update(dt);
  renderer.render(scene,camera);
}
animate(performance.now());
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
